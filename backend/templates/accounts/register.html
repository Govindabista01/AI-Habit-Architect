{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-white p-8 rounded-lg shadow-lg">
        <h2 class="text-3xl font-bold text-center mb-6">Register</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Username</label>
                {{ form.username }}
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Password</label>
                {{ form.password1 }}
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">Confirm Password</label>
                {{ form.password2 }}
            </div>
            
            {% if form.errors %}
            <div class="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded">
                {{ form.errors }}
            </div>
            {% endif %}
            
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded hover:bg-indigo-700">
                Register
            </button>
        </form>
        
        <p class="text-center mt-4 text-gray-600">
            Already have an account? 
            <a href="{% url 'login' %}" class="text-indigo-600 hover:underline">Login</a>
        </p>
    </div>
</div>

<style>
    input[type="text"], input[type="password"] {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
    }
    input:focus {
        outline: none;
        border-color: #6366f1;
    }
</style>
{% endblock %}
