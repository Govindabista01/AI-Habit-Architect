{% extends 'base.html' %}

{% block title %}Login - IntelliHabit{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
    <div class="max-w-[440px] w-full relative z-10">
        <!-- Logo & Header -->
        <div class="text-center mb-10 animate-fade-in">
        <div class="w-24 h-24 mx-auto mb-6 rounded-[2rem] bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center shadow-[0_20px_50px_-10px_rgba(79,70,229,0.5)] transform hover:rotate-6 transition-transform duration-500">
                <span class="text-5xl text-white font-black tracking-tighter">IH</span>
            </div>
            <h2 class="text-4xl font-extrabold text-indigo-950 tracking-tight mb-3">
                Welcome to <span class="text-gradient-primary">IntelliHabit</span>
            </h2>
            <p class="text-indigo-900/50 font-semibold text-sm uppercase tracking-widest">Temporal Access Required</p>
        </div>
        
        <!-- Login Card -->
        <div class="deep-glass p-8 sm:p-12 animate-fade-in" style="animation-delay: 0.1s;">
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-indigo-950/60 font-black text-[11px] uppercase tracking-[0.2em] mb-3 ml-1">Identity Label</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none transition-colors group-focus-within:text-indigo-600 text-indigo-400">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </div>
                        <input type="text" name="username" placeholder="Username" required 
                               class="w-full pl-14 premium-input">
                    </div>
                </div>
                
                <div>
                    <label class="block text-indigo-950/60 font-black text-[11px] uppercase tracking-[0.2em] mb-3 ml-1">Access Key</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none transition-colors group-focus-within:text-indigo-600 text-indigo-400">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </div>
                        <input type="password" name="password" placeholder="••••••••" required 
                               class="w-full pl-14 premium-input">
                    </div>
                </div>
                
                <div class="pt-2">
                    <button type="submit" class="w-full py-5 btn-premium text-lg rounded-2xl flex items-center justify-center group shadow-xl">
                        Login
                        <svg class="w-6 h-6 ml-2 transform group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    </button>
                </div>
            </form>
            
            <!-- Footer Links -->
            <div class="mt-10 text-center">
                <p class="text-indigo-900/40 text-sm font-bold">
                    New to the Architect? 
                    <a href="{% url 'register' %}" class="text-indigo-600 hover:text-indigo-800 transition-colors ml-1 border-b-2 border-transparent hover:border-indigo-600">
                        Create Account
                    </a>
                </p>
            </div>
        </div>
        
        <!-- System Status Decor -->
        <div class="mt-8 flex justify-center items-center space-x-6 animate-fade-in" style="animation-delay: 0.3s;">
            <div class="flex items-center text-[10px] font-black text-indigo-950/30 uppercase tracking-[0.2em]">
                <span class="w-1.5 h-1.5 rounded-full bg-green-400 mr-2 shadow-[0_0_8px_rgba(74,222,128,0.5)]"></span>
                Secure Layer Active
            </div>
            <div class="w-1 h-1 rounded-full bg-indigo-100"></div>
            <div class="text-[10px] font-black text-indigo-950/30 uppercase tracking-[0.2em]">
                IntelliHabit v2.4.1
            </div>
        </div>
    </div>
</div>
{% endblock %}
