{% extends 'base.html' %}

{% block title %}Create Habit{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <a href="{% url 'dashboard' %}" class="text-indigo-600 hover:underline">Back to Dashboard</a>
    </div>
    
    <div class="bg-white p-8 rounded-lg shadow-lg">
        <h2 class="text-3xl font-bold mb-6">Create New Habit</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">Habit Name</label>
                <input type="text" name="name" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-indigo-500">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">Category</label>
                <select name="category" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-indigo-500">
                    <option value="">Select Category</option>
                    <option value="health">Health & Fitness</option>
                    <option value="productivity">Productivity</option>
                    <option value="learning">Learning</option>
                    <option value="mindfulness">Mindfulness</option>
                    <option value="social">Social</option>
                    <option value="finance">Finance</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">Description</label>
                <textarea name="description" rows="3" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-indigo-500"></textarea>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">Frequency Per Week</label>
                <select name="frequency_per_week" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-indigo-500">
                    <option value="">Select Frequency</option>
                    <option value="1">Once a week</option>
                    <option value="2">Twice a week</option>
                    <option value="3">Three times a week</option>
                    <option value="4">Four times a week</option>
                    <option value="5">Five times a week</option>
                    <option value="6">Six times a week</option>
                    <option value="7">Every day</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">Motivation Score (1-10)</label>
                <input type="number" name="motivation_score" min="1" max="10" value="5" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-indigo-500">
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 font-bold mb-2">Difficulty Level (1-10)</label>
                <input type="number" name="difficulty_level" min="1" max="10" value="5" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-indigo-500">
            </div>
            
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 font-bold">
                Create Habit
            </button>
        </form>
    </div>
</div>
{% endblock %}
